name: node-install-and-run
inputs:
  command:
    required: true
    description: "Full shell command to run after npm ci (e.g. 'npm run test:run && npm run test:coverage')"
runs:
  using: composite
  steps:
    # jdx/mise-action@v4.0.1
    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
      with:
        node-version: "24.15.0"
        cache: npm
    - run: npm ci
      shell: bash
    - run: ${{ inputs.command }}
      shell: bash
